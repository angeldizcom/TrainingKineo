spring.application.name=kineo-training-service

spring.datasource.url=jdbc:postgresql://localhost:5432/kineo_training
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-5

kineo.ai.gemini.enabled=false
# spring.ai.vertex.ai.gemini.project-id=${VERTEX_PROJECT_ID}
# spring.ai.vertex.ai.gemini.location=us-central1

kineo.jwt.secret=${JWT_SECRET:kineo-super-secret-key-para-desarrollo-local-minimo-64-caracteres!!}
kineo.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.autoconfigure.exclude=\
  org.springframework.ai.autoconfigure.vertexai.gemini.VertexAiGeminiAutoConfiguration,\
  org.springframework.ai.autoconfigure.vertexai.embedding.VertexAiEmbeddingAutoConfiguration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
