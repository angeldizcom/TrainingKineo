services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=kineo_training'
      - 'POSTGRES_PASSWORD=password'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    volumes:
      - kineo-postgres-data:/var/lib/postgresql/data

volumes:
  kineo-postgres-data: